# ─────────────────────────────────────────────────────────────
#  Save this file at:  .github/workflows/profile-3d.yml
#  Generates an isometric 3D render of your contributions daily,
#  commits the SVG, and the README embeds ./profile-3d-contrib/profile-night-green.svg
# ─────────────────────────────────────────────────────────────
name: GitHub Profile 3D Contrib

on:
  schedule:
    - cron: "0 18 * * *"   # daily at 18:00 UTC
  workflow_dispatch:        # lets you run it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & push generated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib
          git commit -m "chore: regenerate 3d contributions" || echo "Nothing to commit"
          git pull --rebase origin main
          git push
